<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getting started with CSS</title>
    <link rel="stylesheet" href="styles.css">
    <!-- In a subdirectory called styles in the current directory -->
    <link rel="stylesheet" href="styles/style.css" />

    <!-- In a subdirectory called general, which is in a subdirectory called styles, in the current directory -->
    <link rel="stylesheet" href="styles/general/style.css" />

    <!-- Go back one directory level, then in a subdirectory called styles -->
    <link rel="stylesheet" href="../styles/style.css" />
    <style>
        p {
            color: purple;
        }
    </style>
</head>
<body>
    <h1> I am a level one heading</h1>
    <p>
        This is a paragraph of text. In the text is a <span>span element</span>
        and also a <a href="http://example.com">link</a>
    </p>
    <h1>heading 2</h1>
    <p>
        This is the second paragraph. It contains an <em>emphasized</em>
        element
    </p>

    <ul>
        <li>Item <span>one</span></li>
        <li class="special">Item two</li>
        <li>Item <em>three</em></li>
        <li>Item <em>three</em></li>

    </ul>
    <span style="color: purple; font-weight: bold">span element</span>
</body>
</html>
